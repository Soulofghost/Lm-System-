<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LMS Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="login-body d-flex align-items-center justify-content-center">
    <main class="card login-card">
        <div class="retro-titlebar">
            <span>LIBRARY.EXE - Staff Login</span>
            <span class="retro-controls"><span>_</span><span>x</span></span>
        </div>
        <div class="card-body p-4 p-md-5">
            <div class="mb-4">
                <div class="retro-stamp mb-3">CLASSICAL LIBRARY MANAGEMENT SYSTEM</div>
                <h1 class="h4 fw-bold mb-1">Staff Authentication</h1>
                <p class="text-secondary mb-0">Sign in to open the circulation desk.</p>
            </div>
            <div id="loginAlert" class="alert d-none" role="alert"></div>
            <form method="post" action="/login">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input id="username" name="username" class="form-control form-control-lg" autocomplete="username" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input id="password" name="password" type="password" class="form-control form-control-lg" autocomplete="current-password" required>
                </div>
                <button class="btn btn-primary btn-lg w-100" type="submit">Login</button>
            </form>
            <p class="text-center text-secondary small mt-4 mb-0">Default admin: admin / admin123</p>
        </div>
    </main>
    <script>
        const params = new URLSearchParams(location.search);
        const alertBox = document.getElementById('loginAlert');
        if (params.has('error')) {
            alertBox.className = 'alert alert-danger';
            alertBox.textContent = 'Invalid username or password.';
        }
        if (params.has('logout')) {
            alertBox.className = 'alert alert-success';
            alertBox.textContent = 'You have been logged out.';
        }
    </script>
</body>
</html>
