spring.application.name=library-management-system
server.port=8080

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/library_management_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:change_me}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

lms.default-admin.username=${LMS_ADMIN_USERNAME:admin}
lms.default-admin.password=${LMS_ADMIN_PASSWORD:admin123}
lms.default-admin.name=${LMS_ADMIN_NAME:System Administrator}

lms.fine.default-max-borrow-days=14
lms.fine.default-fine-per-day=1.00
